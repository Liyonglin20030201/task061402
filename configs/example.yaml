# dbinspect configuration example
version: "1"

global:
  timeout: 30s
  max_retries: 3
  retry_interval: 5s
  log_level: info
  data_dir: ./data
  report_dir: ./reports

targets:
  - name: prod-mysql
    type: mysql
    host: 127.0.0.1
    port: 3306
    user: inspector
    password: "${MYSQL_PASSWORD}"
    database: myapp
    params:
      charset: utf8mb4
      timeout: 10s

  - name: prod-postgres
    type: postgres
    host: 127.0.0.1
    port: 5432
    user: inspector
    password: "${PG_PASSWORD}"
    database: myapp
    ssl_mode: disable

  - name: prod-redis
    type: redis
    host: 127.0.0.1
    port: 6379
    password: "${REDIS_PASSWORD}"
    db: 0

checks:
  slowquery:
    enabled: true
    threshold: 1s
    top_n: 20

  capacity:
    enabled: true
    warn_threshold_gb: 50
    critical_threshold_gb: 100
    scan_timeout: 2m

  index:
    enabled: true
    min_table_rows: 1000

  backup:
    enabled: true
    paths:
      - /backups/mysql/
      - /backups/postgres/
    max_age: 24h

  permission:
    enabled: true
    deny_patterns:
      - "GRANT ALL"
      - "SUPER"

  replication:
    enabled: true
    max_lag_seconds: 30
    critical_lag_seconds: 120

  schema:
    enabled: true
    exclude_tables:
      - "tmp_*"
      - "migration_*"

risk:
  weights:
    connection: 15
    slowquery: 15
    capacity: 12
    index: 12
    backup: 12
    permission: 12
    replication: 12
    schema: 10

plugins:
  dir: ./plugins
  enabled: []

report:
  format: html
  include_details: true

notifications:
  enabled: false
  thresholds:
    global_risk_score: 60
    category:
      replication: 50
      backup: 70
      capacity: 80
  channels:
    - type: webhook
      url: "https://hooks.example.com/alert"
      timeout: 10s
      headers:
        Authorization: "Bearer ${WEBHOOK_TOKEN}"
    - type: slack
      url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
      slack_channel: "#db-alerts"
      timeout: 10s
    - type: email
      smtp_host: "smtp.example.com"
      smtp_port: 587
      from: "dbinspect@example.com"
      to:
        - "ops@example.com"
      username: "${SMTP_USER}"
      password: "${SMTP_PASS}"
    - type: logfile
      path: "./alerts.log"
